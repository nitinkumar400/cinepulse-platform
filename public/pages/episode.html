<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="no-referrer">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e50914">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineStream">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <title>Watch Episode - CINE STREAM</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
  <style>
    body { background:#000; }

    .episode-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 0;
      min-height: 100vh;
      padding-top: var(--nav-height);
    }

    .player-side {
      background: #000;
      display: flex;
      flex-direction: column;
    }

    .episode-list-side {
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      max-height: calc(100vh - var(--nav-height));
      position: sticky;
      top: var(--nav-height);
    }

    .video-frame-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      overflow: hidden;
    }
    .main-video,
    .video-embed-frame,
    .video-offline-state {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    .main-video,
    .video-embed-frame { display: none; }
    .main-video.is-active,
    .video-embed-frame.is-active { display: block; }
    .video-title-mask {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 5;
      pointer-events: auto;
      background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0));
    }
    .video-offline-state {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: #fff;
      text-align: center;
      padding: 24px;
      background: radial-gradient(circle at center, rgba(24,24,34,0.88), rgba(0,0,0,0.98));
    }
    .video-offline-state.is-visible { display: flex; }

    .episode-info-bar {
      background: var(--bg-secondary);
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .ep-series-link {
      font-size:13px; color:var(--accent);
      display:inline-flex; align-items:center;
      gap:6px; margin-bottom:10px;
      transition:var(--transition);
      text-decoration:none;
    }
    .ep-series-link:hover { color:#fff; }

    .ep-title {
      font-family:var(--font-display);
      font-size:28px; letter-spacing:1px; margin-bottom:8px;
    }

    .ep-meta {
      display:flex; align-items:center;
      gap:14px; font-size:13px;
      color:var(--text-muted); flex-wrap:wrap;
    }
    .ep-meta span { display:flex; align-items:center; gap:5px; }
    .ep-desc {
      font-size:14px; color:var(--text-secondary);
      line-height:1.7; margin-top:12px;
    }

    /* ══════════════════════════════════════
       AUTOPLAY BAR — fully rebuilt
       ══════════════════════════════════════ */
    .next-ep-bar {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      margin: 16px 24px;
      overflow: hidden;
      display: none;
      flex-direction: column;
      animation: slideUp 0.4s ease;
    }
    .next-ep-bar.show { display:flex; }

    @keyframes slideUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .next-ep-top {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      cursor: pointer;
      transition: var(--transition);
    }
    .next-ep-top:hover { background:var(--bg-hover); }

    .next-ep-thumb {
      width:100px; height:60px; object-fit:cover;
      border-radius:var(--radius); flex-shrink:0;
      background:var(--bg-secondary);
    }

    .next-ep-text { flex:1; min-width:0; }
    .next-ep-label {
      font-size:11px; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;
    }
    .next-ep-title {
      font-size:14px; font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .next-ep-meta { font-size:12px; color:var(--text-muted); margin-top:3px; }

    /* Countdown ring */
    .countdown-wrap {
      display:flex; flex-direction:column;
      align-items:center; gap:4px; flex-shrink:0;
    }

    .countdown-ring {
      position:relative; width:48px; height:48px;
    }
    .countdown-ring svg {
      transform: rotate(-90deg);
      width:48px; height:48px;
    }
    .ring-bg {
      fill:none; stroke:var(--border);
      stroke-width:4;
    }
    .ring-fill {
      fill:none; stroke:var(--accent);
      stroke-width:4;
      stroke-linecap:round;
      stroke-dasharray:126;
      stroke-dashoffset:0;
      transition:stroke-dashoffset 1s linear;
    }
    .countdown-num {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-size:15px; font-weight:700;
      color:var(--text-primary);
    }
    .countdown-label {
      font-size:10px; color:var(--text-muted); white-space:nowrap;
    }

    /* Progress bar at bottom */
    .autoplay-progress {
      height:3px;
      background:var(--border);
      position:relative;
      overflow:hidden;
    }
    .autoplay-progress-fill {
      height:100%;
      background:var(--accent);
      width:0%;
      transition:width 1s linear;
    }

    /* Cancel button row */
    .autoplay-actions {
      display:flex; align-items:center;
      justify-content:space-between;
      padding:10px 20px 14px;
      border-top:1px solid var(--border);
    }
    .autoplay-msg {
      font-size:12px; color:var(--text-muted);
    }
    .cancel-autoplay-btn {
      background:none;
      border:1px solid var(--border);
      border-radius:var(--radius);
      color:var(--text-secondary);
      font-size:12px; padding:5px 14px;
      cursor:pointer;
      font-family:var(--font-body);
      transition:var(--transition);
    }
    .cancel-autoplay-btn:hover {
      border-color:var(--accent);
      color:var(--accent);
    }

    /* ══════════════════════════════════════
       SEASON TABS & EPISODE LIST
       ══════════════════════════════════════ */
    .season-tabs {
      display:flex; gap:0;
      border-bottom:1px solid var(--border);
      overflow-x:auto; scrollbar-width:none;
      padding:16px 16px 0;
    }
    .season-tabs::-webkit-scrollbar { display:none; }

    .season-tab {
      padding:8px 20px; font-size:13px; font-weight:600;
      color:var(--text-muted); cursor:pointer;
      border-bottom:2px solid transparent;
      transition:var(--transition); white-space:nowrap;
      background:none; border-top:none;
      border-left:none; border-right:none;
      font-family:var(--font-body);
    }
    .season-tab:hover   { color:var(--text-primary); }
    .season-tab.active  { color:var(--accent); border-bottom-color:var(--accent); }

    .episodes-header {
      padding:16px 20px 8px;
      font-size:12px; color:var(--text-muted);
      text-transform:uppercase; letter-spacing:1px;
    }

    .episode-item {
      display:flex; gap:12px; padding:12px 16px;
      cursor:pointer; transition:var(--transition);
      border-bottom:1px solid rgba(255,255,255,0.04);
      align-items:center;
    }
    .episode-item:hover  { background:var(--bg-hover); }
    .episode-item.active {
      background:rgba(229,9,20,0.1);
      border-left:3px solid var(--accent);
    }

    .ep-thumb-small {
      width:96px; height:54px; object-fit:cover;
      border-radius:6px; flex-shrink:0;
      background:var(--bg-card);
    }

    .ep-num        { font-size:11px; color:var(--text-muted); margin-bottom:3px; }
    .ep-item-title { font-size:13px; font-weight:600; line-height:1.3; }
    .ep-item-duration { font-size:11px; color:var(--text-muted); margin-top:3px; }

    .ep-playing-icon {
      margin-left:auto; flex-shrink:0;
      color:var(--accent); font-size:18px; display:none;
    }
    .episode-item.active .ep-playing-icon { display:block; }

    /* Rating */
    .rating-section {
      padding:0 24px 20px;
      display:flex; align-items:center;
      gap:12px; flex-wrap:wrap;
    }
    .rating-section span { font-size:14px; color:var(--text-muted); }
    #epRatingStars { display:flex; gap:3px; }
    #epRatingStars button {
      background:none; border:none; cursor:pointer;
      font-size:20px; color:var(--text-muted);
      transition:color 0.15s,transform 0.1s; padding:2px;
    }
    #epRatingStars button:hover { transform:scale(1.3); }

    /* Filler badge */
    .filler-badge {
      display:inline-block;
      background:rgba(245,197,24,0.15);
      color:#fbbf24;
      border:1px solid rgba(245,197,24,0.3);
      font-size:11px; padding:2px 10px;
      border-radius:20px; margin-left:8px;
      vertical-align:middle;
    }

    @media (max-width:900px) {
      .episode-layout { grid-template-columns:1fr; }
      .episode-list-side {
        max-height:400px; position:relative;
        top:0; border-left:none;
        border-top:1px solid var(--border);
      }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <a href="index.html" class="nav-logo">CINE<span>STREAM</span></a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="index.html?category=anime">Anime</a>
    <a href="index.html?category=series">Series</a>
  </div>
  <div class="nav-right" id="userSection"></div>
</nav>

<!-- Loading -->
<div id="loadingState" style="padding-top:var(--nav-height);">
  <div class="spinner-container" style="height:60vh;"><div class="spinner"></div></div>
</div>

<!-- Main Content -->
<div id="mainContent" style="display:none;">
  <div class="episode-layout">

    <!-- LEFT: Player -->
    <div class="player-side">

      <!-- Video -->
      <div id="videoContainer" style="background:#000;width:100%;">
        <div class="video-frame-wrapper">
          <div class="video-title-mask" aria-hidden="true"></div>
          <video id="videoPlayer" class="main-video" preload="metadata" playsinline>
            Your browser does not support video.
          </video>
          <iframe
            id="episodeEmbedFrame"
            class="video-embed-frame"
            title="Episode Player"
            allow="autoplay; encrypted-media; picture-in-picture"
            allowfullscreen
            referrerpolicy="no-referrer"
          ></iframe>
          <div id="episodeOfflineState" class="video-offline-state">
            <div style="font-size:52px;">📡</div>
            <h3 style="margin:0;font-size:28px;">Source Offline</h3>
            <p id="episodeOfflineMessage" style="margin:0;color:var(--text-muted);">This episode source is unavailable right now.</p>
          </div>
        </div>
      </div>

      <!-- Episode Info -->
      <div class="episode-info-bar">
        <a href="#" id="seriesLink" class="ep-series-link">
          <i class="ri-arrow-left-line"></i>
          <span id="seriesTitle">Back to Series</span>
        </a>
        <h1 class="ep-title" id="epTitle">Loading...</h1>
        <div class="ep-meta">
          <span><i class="ri-film-line"></i> <span id="epSeason"></span></span>
          <span>•</span>
          <span><i class="ri-play-circle-line"></i> <span id="epNumber"></span></span>
          <span>•</span>
          <span><i class="ri-time-line"></i> <span id="epDuration"></span></span>
          <span>•</span>
          <span><i class="ri-eye-line"></i> <span id="epViews"></span> views</span>
        </div>
        <p class="ep-desc" id="epDesc"></p>
      </div>

      <!-- Rating -->
      <div class="rating-section">
        <span>Rate this episode:</span>
        <div id="epRatingStars"></div>
      </div>

      <!-- ══════════════════════════════════
           AUTOPLAY NEXT EPISODE BAR
           (hidden until episode ends)
           ══════════════════════════════════ -->
      <div class="next-ep-bar" id="nextEpBar">

        <!-- Clickable top section — navigate now -->
        <div class="next-ep-top" id="nextEpClickArea">
          <img id="nextEpThumb" class="next-ep-thumb" src="" alt="Next Episode"
               referrerpolicy="no-referrer"
               onerror="this.style.background='var(--bg-secondary)'">
          <div class="next-ep-text">
            <div class="next-ep-label">Up Next</div>
            <div class="next-ep-title" id="nextEpTitle">Next Episode</div>
            <div class="next-ep-meta" id="nextEpMeta"></div>
          </div>
          <div class="countdown-wrap">
            <div class="countdown-ring">
              <svg viewBox="0 0 48 48">
                <circle class="ring-bg"   cx="24" cy="24" r="20"/>
                <circle class="ring-fill" id="ringFill" cx="24" cy="24" r="20"/>
              </svg>
              <div class="countdown-num" id="countdownNum">5</div>
            </div>
            <div class="countdown-label">Auto-play</div>
          </div>
        </div>

        <!-- Progress bar -->
        <div class="autoplay-progress">
          <div class="autoplay-progress-fill" id="autoplayProgressFill"></div>
        </div>

        <!-- Cancel / Play Now row -->
        <div class="autoplay-actions">
          <span class="autoplay-msg" id="autoplayMsg">Playing in 5 seconds...</span>
          <div style="display:flex;gap:8px;">
            <button class="cancel-autoplay-btn" id="cancelAutoplayBtn">
              <i class="ri-close-line"></i> Cancel
            </button>
            <button class="cancel-autoplay-btn"
                    id="playNowBtn"
                    style="background:var(--accent);border-color:var(--accent);color:#fff;">
              <i class="ri-play-fill"></i> Play Now
            </button>
          </div>
        </div>

      </div>

    </div>

    <!-- RIGHT: Episode List -->
    <div class="episode-list-side" id="episodeListSide">
      <div class="season-tabs"  id="seasonTabs"></div>
      <div class="episodes-header">Episodes</div>
      <div id="episodesList"></div>
    </div>

  </div>
</div>

<!-- Error -->
<div id="errorState" style="display:none;padding-top:calc(var(--nav-height)+60px);">
  <div class="empty-state">
    <div class="empty-state-icon">😕</div>
    <h3>Episode Not Found</h3>
    <a href="index.html" class="btn btn-primary" style="margin-top:20px;display:inline-flex;">
      <i class="ri-home-line"></i> Go Home
    </a>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="../js/config.js"></script>
<script src="../js/app.js"></script>
<script src="../js/pwa.js"></script>
<script src="../js/embedServers.js"></script>
<script src="../js/videoEngine.js"></script>
<script src="../js/videoPlayer.js"></script>
<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let currentEpisode = null;
let nextEpisode    = null;
let prevEpisode    = null;
let allEpisodes    = {};
let currentSeason  = 1;
let countdownTimer = null;
let saveTimer      = null;
let seriesId       = null;
let autoplayCancelled = false;
const CONTINUE_WATCHING_KEY = 'cs_continue_watching';

const COUNTDOWN_SECONDS = 5;
const CIRCUMFERENCE     = 2 * Math.PI * 20; // r=20 → 125.66

const urlParams = new URLSearchParams(window.location.search);
const episodeId = urlParams.get('id');
const startTime = parseInt(urlParams.get('t') || '0');
let subtitleAutoloadAttempted = false;

// FIX: URL helper — handles Cloudinary (https://) and local paths
function getUrl(url) {
  if (!url) return '';
  if (url.startsWith('http')) return url;
  return (typeof MEDIA_BASE !== 'undefined' ? MEDIA_BASE : '') + url;
}
const getImageUrl = getUrl;

function activateEpisodeSurface(mode) {
  document.getElementById('videoPlayer').classList.toggle('is-active', mode === 'native');
  document.getElementById('episodeEmbedFrame').classList.toggle('is-active', mode === 'embed');
  document.getElementById('episodeOfflineState').classList.toggle('is-visible', mode === 'offline');
}

function showEpisodeOffline(message) {
  const frame = document.getElementById('episodeEmbedFrame');
  frame.removeAttribute('src');
  frame.removeAttribute('srcdoc');
  document.getElementById('episodeOfflineMessage').textContent =
    message || 'This episode source is unavailable right now.';
  activateEpisodeSurface('offline');
}

function loadEpisodeVideo(ep) {
  const video = document.getElementById('videoPlayer');
  const frame = document.getElementById('episodeEmbedFrame');
  const playback = ep.playback || {};
  const sourceType = ep.sourceType || playback.sourceType || (window.getSourceType?.(ep.videoUrl) || 'local');

  frame.removeAttribute('srcdoc');
  frame.removeAttribute('src');
  video.removeAttribute('src');
  video.poster = getUrl(ep.thumbnailUrl);

  if (sourceType === 'youtube' || sourceType === 'dailymotion') {
    const embedUrl = playback.embedUrl || window.getCleanEmbedUrl?.(ep.videoUrl) || '';
    if (!embedUrl) {
      showEpisodeOffline('This external episode source is malformed or unavailable.');
      return;
    }

    activateEpisodeSurface('embed');
    frame.src = embedUrl;
    frame.onload = () => {};
    return;
  }

  if (!ep.videoUrl) {
    showEpisodeOffline('No episode stream is available yet.');
    return;
  }

  activateEpisodeSurface('native');
  video.src = getUrl(ep.videoUrl);
  video.load();
}

const THUMB_PH = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iOTYiIGhlaWdodD0iNTQiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCUiIGhlaWdodD0iMTAwJSIgZmlsbD0iIzFhMWEyNCIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LXNpemU9IjE4IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSIgZmlsbD0iIzQ0NCI+4pWQPC90ZXh0Pjwvc3ZnPg==';

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('DOMContentLoaded', async () => {
  setupNavbar();

  if (!episodeId) { showState('error'); return; }

  const token = localStorage.getItem('token');
  // Public page — no auth required to view episodes

  try {
    const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
    const [epRes, ] = await Promise.all([
      fetch(`${API_BASE}/episodes/${episodeId}`, { headers }),
    ]);

    if (!epRes.ok) throw new Error('Episode not found');

    const data     = await epRes.json();
    currentEpisode = data.episode;
    nextEpisode    = data.nextEpisode    || null;
    prevEpisode    = data.prevEpisode    || null;
    seriesId       = currentEpisode.series._id || currentEpisode.series;

    // Load all episodes for sidebar
    const epListRes  = await fetch(`${API_BASE}/episodes/series/${seriesId}`);
    const epListData = await epListRes.json();
    allEpisodes      = epListData.seasons || {};

    renderEpisode();
    renderSeasonTabs();
    renderEpisodeList(currentEpisode.season);
    setupAutoplayButtons();
    setupProgressTracking();

    showState('content');

    // Init VideoPlayer with episode ID for resume
    if (typeof VideoPlayer !== 'undefined' && VideoPlayer.init) {
      VideoPlayer.init('videoPlayer', 'videoContainer', episodeId);
    }

    setupSubtitleAutoload();

  } catch (e) {
    console.error('Episode load error:', e);
    showState('error');
  }
});

function showState(state) {
  document.getElementById('loadingState').style.display =
    state === 'loading' ? 'block' : 'none';
  document.getElementById('mainContent').style.display  =
    state === 'content' ? 'block' : 'none';
  document.getElementById('errorState').style.display   =
    state === 'error'   ? 'block' : 'none';
}

// ══════════════════════════════════════════
// RENDER EPISODE
// FIX: getUrl() used for all media — handles Cloudinary
// ══════════════════════════════════════════
function renderEpisode() {
  const ep = currentEpisode;

  document.title =
    `S${ep.season}E${ep.episodeNumber}: ${ep.title} - CINE STREAM`;

  // Back link
  const seriesInfo = ep.series;
  const seriesPageId = seriesInfo._id || seriesInfo;
  document.getElementById('seriesLink').href =
    `/pages/movie-details.html?id=${seriesPageId}`;
  document.getElementById('seriesTitle').textContent =
    seriesInfo.title || 'Back to Series';

  // Info
  document.getElementById('epTitle').innerHTML =
    escapeHtml(ep.title) +
    (ep.isFiller ? '<span class="filler-badge">Filler</span>' : '');
  document.getElementById('epSeason').textContent   = `Season ${ep.season}`;
  document.getElementById('epNumber').textContent   = `Episode ${ep.episodeNumber}`;
  document.getElementById('epDuration').textContent = `${ep.duration || 0} min`;
  document.getElementById('epViews').textContent    =
    (ep.views || 0).toLocaleString();
  document.getElementById('epDesc').textContent     = ep.description || '';

  loadEpisodeVideo(ep);

  // Resume from URL param
  const video = document.getElementById('videoPlayer');
  if (startTime > 0) {
    video.addEventListener('loadedmetadata', function() {
      this.currentTime = startTime;
    }, { once: true });
  }

  // Populate next episode bar
  if (nextEpisode) {
    const nextThumb = document.getElementById('nextEpThumb');
    nextThumb.src   = getUrl(nextEpisode.thumbnailUrl) || THUMB_PH;

    document.getElementById('nextEpTitle').textContent =
      `S${nextEpisode.season}E${nextEpisode.episodeNumber}: ${nextEpisode.title}`;
    document.getElementById('nextEpMeta').textContent  =
      `${nextEpisode.duration || 0} min`;
  }

  renderRatingStars();

  // FIX: Video ended → trigger autoplay countdown
  video.addEventListener('ended', () => {
    if (nextEpisode && !autoplayCancelled) {
      startCountdown();
    }
  });

  // Show next ep button when within 30s of end (for long videos)
  video.addEventListener('timeupdate', () => {
    if (!nextEpisode) return;
    const remaining = video.duration - video.currentTime;
    if (remaining <= 30 && remaining > 0 && !autoplayCancelled) {
      // Show bar early so user can see what's coming
      document.getElementById('nextEpBar').classList.add('show');
    }
  });
}

function setupSubtitleAutoload() {
  if (subtitleAutoloadAttempted || !currentEpisode) return;
  subtitleAutoloadAttempted = true;

  const video = document.getElementById('videoPlayer');
  if (!video) return;

  video.addEventListener('loadedmetadata', async () => {
    try {
      await loadEpisodeSubtitles();
    } catch (e) {
      console.warn('Episode subtitle auto-load failed:', e.message);
    }
  }, { once: true });
}

async function loadEpisodeSubtitles() {
  const token = localStorage.getItem('token');
  if (!token || typeof VideoPlayer === 'undefined') return;

  const series = currentEpisode.series || {};
  const movieId = series._id || series.id || seriesId;
  const titleCandidates = [
    currentEpisode.title,
    `${series.title || ''} S${currentEpisode.season || 1}E${currentEpisode.episodeNumber || 1}`,
    series.title,
  ].filter(Boolean);

  const subtitleTracks = [];
  const seenUrls = new Set();

  if (movieId) {
    const storedRes = await fetch(`${API_BASE}/subtitles/movie/${movieId}`);
    const storedData = await storedRes.json().catch(() => ({ subtitles: [] }));
    (storedData.subtitles || []).forEach((sub) => {
      if (!sub?.vttUrl || seenUrls.has(sub.vttUrl)) return;
      seenUrls.add(sub.vttUrl);
      subtitleTracks.push({
        language: sub.language || 'en',
        label: sub.title || String(sub.language || 'en').toUpperCase(),
        url: sub.vttUrl,
        default: (sub.language || 'en') === 'en',
      });
    });
  }

  if (subtitleTracks.length === 0) {
    for (const candidate of titleCandidates) {
      const searchRes = await fetch(
        `${API_BASE}/subtitles/search/${encodeURIComponent(candidate)}?langs=en,hi`,
        { headers: { Authorization: `Bearer ${token}` } }
      );
      const searchData = await searchRes.json().catch(() => ({ results: [] }));
      if (!searchRes.ok || !searchData.results?.length) continue;

      const preferred = [...searchData.results]
        .sort((a, b) => (b.download_count || 0) - (a.download_count || 0))
        .slice(0, 2);

      for (const result of preferred) {
        let vttUrl = result.subtitle_url;
        if (!vttUrl) {
          const dlRes = await fetch(
            `${API_BASE}/subtitles/download/${result.file_id}?lang=${encodeURIComponent(result.language || 'en')}&movieId=${encodeURIComponent(movieId || '')}&title=${encodeURIComponent(candidate)}`,
            { headers: { Authorization: `Bearer ${token}` } }
          );
          const dlData = await dlRes.json().catch(() => ({}));
          if (!dlRes.ok) continue;
          vttUrl = dlData.url;
        }

        if (!vttUrl || seenUrls.has(vttUrl)) continue;
        seenUrls.add(vttUrl);
        subtitleTracks.push({
          language: result.language || 'en',
          label: result.language_name || result.language || 'Subtitle',
          url: vttUrl,
          default: (result.language || 'en') === 'en',
        });
      }

      if (subtitleTracks.length > 0) break;
    }
  }

  if (subtitleTracks.length > 0) {
    VideoPlayer.loadSubtitles(subtitleTracks);
  }
}

// ══════════════════════════════════════════
// AUTOPLAY BUTTONS — all addEventListener
// FIX: Old code used inline onclick="goToNextEpisode()"
// which fails in CSP environments
// ══════════════════════════════════════════
function setupAutoplayButtons() {
  // Click anywhere on the top section = play immediately
  document.getElementById('nextEpClickArea').addEventListener('click', () => {
    stopCountdown();
    goToNextEpisode();
  });

  // Play Now button
  document.getElementById('playNowBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    stopCountdown();
    goToNextEpisode();
  });

  // Cancel button
  document.getElementById('cancelAutoplayBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    cancelAutoplay();
  });
}

// ══════════════════════════════════════════
// COUNTDOWN — rebuilt with correct SVG ring math
// FIX: Old code used conic-gradient which is not supported
// on all browsers and had wrong percentage calculation
// FIX: Added progress bar animation
// FIX: Added autoplayMsg update every second
// ══════════════════════════════════════════
function startCountdown() {
  if (!nextEpisode) return;

  autoplayCancelled = false;

  const bar        = document.getElementById('nextEpBar');
  const numEl      = document.getElementById('countdownNum');
  const ringFill   = document.getElementById('ringFill');
  const progressFill= document.getElementById('autoplayProgressFill');
  const msg        = document.getElementById('autoplayMsg');

  bar.classList.add('show');

  // SVG ring setup — circumference of r=20 circle
  ringFill.style.strokeDasharray  = CIRCUMFERENCE;
  ringFill.style.strokeDashoffset = 0;

  let count = COUNTDOWN_SECONDS;
  numEl.textContent  = count;
  msg.textContent    = `Playing in ${count} second${count !== 1 ? 's' : ''}...`;

  // Initial ring state (full)
  ringFill.style.transition      = 'none';
  ringFill.style.strokeDashoffset = 0;

  countdownTimer = setInterval(() => {
    count--;

    if (count < 0) {
      clearInterval(countdownTimer);
      if (!autoplayCancelled) goToNextEpisode();
      return;
    }

    numEl.textContent = count;
    msg.textContent   = `Playing in ${count} second${count !== 1 ? 's' : ''}...`;

    // SVG ring: drain from full to empty over COUNTDOWN_SECONDS
    const elapsed = COUNTDOWN_SECONDS - count;
    const offset  = (elapsed / COUNTDOWN_SECONDS) * CIRCUMFERENCE;
    ringFill.style.transition      = 'stroke-dashoffset 1s linear';
    ringFill.style.strokeDashoffset = offset;

    // Bottom progress bar
    const pct = (elapsed / COUNTDOWN_SECONDS) * 100;
    progressFill.style.transition = 'width 1s linear';
    progressFill.style.width      = pct + '%';

  }, 1000);
}

function stopCountdown() {
  clearInterval(countdownTimer);
  countdownTimer = null;
}

function cancelAutoplay() {
  stopCountdown();
  autoplayCancelled = true;

  const bar = document.getElementById('nextEpBar');
  bar.classList.remove('show');

  if (typeof showToast === 'function') {
    showToast('Autoplay cancelled', 'info');
  }
}

function goToNextEpisode() {
  stopCountdown();
  if (nextEpisode) {
    window.location.href = `/pages/episode.html?id=${nextEpisode._id}`;
  }
}

// ══════════════════════════════════════════
// SEASON TABS
// FIX: Replaced inline onclick with event delegation
// ══════════════════════════════════════════
function renderSeasonTabs() {
  const container = document.getElementById('seasonTabs');
  const seasons   = Object.keys(allEpisodes).sort((a, b) => +a - +b);
  currentSeason   = currentEpisode.season;

  container.innerHTML = seasons.map(s => `
    <button class="season-tab ${+s === currentSeason ? 'active' : ''}"
            data-season="${s}">
      Season ${s}
    </button>`).join('');

  container.addEventListener('click', (e) => {
    const btn = e.target.closest('.season-tab');
    if (!btn) return;
    const season = parseInt(btn.dataset.season);
    currentSeason = season;
    container.querySelectorAll('.season-tab').forEach(t => {
      t.classList.toggle('active', parseInt(t.dataset.season) === season);
    });
    renderEpisodeList(season);
  });
}

// ══════════════════════════════════════════
// EPISODE LIST
// FIX: Replaced inline onclick with event delegation
// FIX: getUrl() for thumbnails
// ══════════════════════════════════════════
function renderEpisodeList(season) {
  const episodes  = allEpisodes[season] || [];
  const container = document.getElementById('episodesList');

  if (episodes.length === 0) {
    container.innerHTML =
      '<p style="padding:20px;color:var(--text-muted);">No episodes yet</p>';
    return;
  }

  container.innerHTML = episodes.map(ep => `
    <div class="episode-item ${ep._id === episodeId ? 'active' : ''}"
         data-ep-id="${ep._id}">
      <img class="ep-thumb-small"
           src="${getUrl(ep.thumbnailUrl) || THUMB_PH}"
           alt="${escapeHtml(ep.title)}"
           referrerpolicy="no-referrer"
           onerror="this.src='${THUMB_PH}'">
      <div style="flex:1;min-width:0;">
        <div class="ep-num">Episode ${ep.episodeNumber}${ep.isFiller ? ' · <span style="color:#fbbf24;font-size:10px;">FILLER</span>' : ''}</div>
        <div class="ep-item-title">${escapeHtml(ep.title)}</div>
        <div class="ep-item-duration">${ep.duration || 0} min</div>
      </div>
      <i class="ri-volume-up-line ep-playing-icon"></i>
    </div>`).join('');

  // Single event delegation — no per-item listeners
  if (!container._delegated) {
    container._delegated = true;
    container.addEventListener('click', (e) => {
      const item = e.target.closest('.episode-item[data-ep-id]');
      if (item) {
        window.location.href = `/pages/episode.html?id=${item.dataset.epId}`;
      }
    });
  }

  // Scroll active episode into view
  const activeEl = container.querySelector('.episode-item.active');
  if (activeEl) {
    setTimeout(() => activeEl.scrollIntoView({ behavior:'smooth', block:'nearest' }), 300);
  }
}

// ══════════════════════════════════════════
// RATING STARS
// ══════════════════════════════════════════
function renderRatingStars() {
  const container = document.getElementById('epRatingStars');
  container.innerHTML = '';
  let savedRating = 0;

  for (let i = 1; i <= 10; i++) {
    const star = document.createElement('button');
    star.textContent    = '★';
    star.title          = `Rate ${i}/10`;
    star.dataset.rating = i;
    container.appendChild(star);
  }

  const stars = () => container.querySelectorAll('button');

  container.addEventListener('mouseenter', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    const n = parseInt(btn.dataset.rating);
    stars().forEach((s, i) => {
      s.style.color = i < n ? 'var(--gold)' : 'var(--text-muted)';
    });
  }, true);

  container.addEventListener('mouseleave', () => {
    stars().forEach((s, i) => {
      s.style.color = i < savedRating ? 'var(--gold)' : 'var(--text-muted)';
    });
  });

  container.addEventListener('click', (e) => {
    const btn = e.target.closest('button');
    if (!btn) return;
    savedRating = parseInt(btn.dataset.rating);
    stars().forEach((s, i) => {
      s.style.color = i < savedRating ? 'var(--gold)' : 'var(--text-muted)';
    });
    if (typeof showToast === 'function') {
      showToast(`Rated ${savedRating}/10! ⭐`, 'success');
    }
  });
}

// ══════════════════════════════════════════
// PROGRESS TRACKING
// FIX: Save every 15s (not 10s) to reduce API calls
// FIX: Uses episodeId in episodeId field (not movieId)
// so episode progress is tracked separately from movie progress
// ══════════════════════════════════════════
function setupProgressTracking() {
  const video = document.getElementById('videoPlayer');
  const token = localStorage.getItem('token');
  if (!token || !video) return;

  const doSave = (ct, td) => {
    if (!isFinite(td) || td < 1) return;
    try {
      localStorage.setItem(CONTINUE_WATCHING_KEY, JSON.stringify({
        movieId: seriesId || '',
        episodeId: episodeId || '',
        title: `${currentEpisode?.series?.title || ''} · S${currentEpisode?.season || 1}E${currentEpisode?.episodeNumber || 1}`,
        thumbnailUrl: currentEpisode?.thumbnailUrl || currentEpisode?.series?.thumbnailUrl || '',
        progress: Math.floor(ct),
        totalDuration: Math.floor(td),
        updatedAt: new Date().toISOString(),
        href: `/pages/episode.html?id=${episodeId}&t=${Math.floor(ct)}`,
      }));
    } catch {}

    fetch(`${API_BASE}/watch/progress`, {
      method:  'POST',
      headers: {
        'Content-Type':  'application/json',
        'Authorization': `Bearer ${token}`,
      },
      body: JSON.stringify({
        movieId:       seriesId,
        episodeId:     episodeId,
        progress:      Math.floor(ct),
        totalDuration: Math.floor(td),
      }),
    }).catch(() => {});
  };

  video.addEventListener('timeupdate', function() {
    if (!this.paused) {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => doSave(this.currentTime, this.duration), 15000);
    }
  });

  video.addEventListener('pause',  function() { doSave(this.currentTime, this.duration); });
  video.addEventListener('ended',  function() { doSave(this.duration, this.duration); });
}

// ══════════════════════════════════════════
// NAVBAR
// Stateless Public Site: no auth buttons in public navbar
// ══════════════════════════════════════════
function setupNavbar() {
  const sec = document.getElementById('userSection');
  if (sec) sec.innerHTML = '';
}

// ── escapeHtml fallback ──
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}
