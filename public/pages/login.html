<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#e50914">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CineStream">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">
  <title>Login - CINE STREAM</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>CINE<span>STREAM</span></h1>
        <p>Admin control center</p>
      </div>

      <h2 class="auth-title">Admin Sign In</h2>
      <p class="auth-subtitle">Only admin accounts can access the platform</p>
      <div id="alertBox" style="display:none;"></div>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <div class="input-with-icon">
            <i class="ri-mail-line input-icon"></i>
            <input type="email" id="email" placeholder="your@email.com" autocomplete="email" required>
          </div>
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-with-icon">
            <i class="ri-lock-line input-icon"></i>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
            <i class="ri-eye-line password-toggle" id="togglePassword"></i>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
          <i class="ri-login-box-line"></i>
          <span>Sign In</span>
        </button>
      </form>

      <div class="auth-footer">Public signup is disabled.</div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="../js/config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/pwa.js"></script>
  <script>
    // login.html now redirects to admin.html which has its own login gate
    (function() {
      const token = localStorage.getItem('token');
      const user = JSON.parse(localStorage.getItem('user') || 'null');
      // If already logged in as admin, go straight to admin panel
      if (token && user?.role === 'admin') {
        window.location.href = 'admin.html';
        return;
      }
      // Otherwise redirect to admin.html which has the login form
      window.location.href = 'admin.html';
    })();
  </script>
</body>
</html>
