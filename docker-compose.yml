services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cine_stream_backend
    ports:
      - "5000:5000"
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/cine-stream
    depends_on:
      - mongo
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: cine_stream_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
