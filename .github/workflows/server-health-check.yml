name: Server Health Check

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger health check endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "Missing CRON_SECRET secret"
            exit 1
          fi

          HEALTH_CHECK_URL="https://cinepulse-platform.vercel.app/api/admin/servers/health/run"

          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${HEALTH_CHECK_URL}"
