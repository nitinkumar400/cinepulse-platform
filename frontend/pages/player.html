<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <title>CINE STREAM Player</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05070c;
      --panel: #0b0f18;
      --border: rgba(255,255,255,0.1);
      --accent: #e50914;
      --text: #f5f7fb;
      --muted: #98a2b3;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(229,9,20,0.18), transparent 38%),
        linear-gradient(180deg, #06080f, #020409 65%);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
      padding: 24px;
    }

    .player-shell {
      width: min(1120px, 100%);
      background: linear-gradient(180deg, rgba(17,24,39,0.98), rgba(3,7,18,1));
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 36px 90px rgba(0,0,0,0.7);
    }

    .video-frame-wrapper {
      position: relative;
      width: 100%;
      height: 0;
      padding-top: 56.25%;
      overflow: hidden;
      border-radius: 18px;
      background: #000;
    }

    .video-frame-wrapper iframe,
    .video-frame-wrapper .player-offline {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .title-mask {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      z-index: 2;
      pointer-events: auto;
      background: linear-gradient(to bottom, rgba(0,0,0,0.92), rgba(0,0,0,0));
    }

    .player-offline {
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      background: radial-gradient(circle at center, rgba(22,28,45,0.85), rgba(0,0,0,0.96));
      text-align: center;
      padding: 24px;
      z-index: 1;
    }

    .player-offline.is-visible { display: flex; }
    .player-offline h2 { margin: 0; font-size: 28px; }
    .player-offline p { margin: 0; color: var(--muted); }
  </style>
</head>
<body>
  <div class="player-shell">
    <div class="video-frame-wrapper">
      <div class="title-mask" aria-hidden="true"></div>
      <iframe
        id="universalPlayerFrame"
        title="CINE STREAM Universal Player"
        sandbox="allow-same-origin allow-scripts allow-presentation"
        allow="autoplay; encrypted-media; picture-in-picture"
        allowfullscreen
        referrerpolicy="no-referrer"
      ></iframe>
      <div class="player-offline" id="playerOffline">
        <h2>Source Offline</h2>
        <p>This stream is unavailable right now. Try another source in CineStream.</p>
      </div>
    </div>
  </div>
</body>
</html>
